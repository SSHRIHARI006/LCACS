version: '3.8'

services:
  worker_1:
    build: .
    environment:
      - WORKER_ID=1
      - COMPUTE_POWER=2.0  # Fast CPU
      - BANDWIDTH=10.0     # Fast Network
    ports:
      - "8001:8000"

  worker_2:
    build: .
    environment:
      - WORKER_ID=2
      - COMPUTE_POWER=0.5  # Slow CPU
      - BANDWIDTH=2.0      # Slow Network
    ports:
      - "8002:8000"